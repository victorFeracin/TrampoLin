openapi: 3.0.3
info:
  title: TrampoLin API
  version: 1.0.0
  description: |
    OpenAPI 3.0 documentation for the TrampoLin REST API, based on Epic TRAM-1 and
    User Stories TRAM-2 through TRAM-11.

    Profiles:
      - candidate
      - recruiter

    Public routes:
      - POST /auth/register
      - POST /auth/login
      - GET /jobs
      - GET /jobs/{id}

    All other routes require JWT Bearer token authentication.
servers:
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Authentication
  - name: Jobs
  - name: Applications
paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Registers a new user with the `candidate` or `recruiter` role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              candidate:
                value:
                  name: Ana Souza
                  email: ana.souza@example.com
                  password: StrongPass123
                  role: candidate
              recruiter:
                value:
                  name: Carlos Lima
                  email: carlos.lima@example.com
                  password: StrongPass123
                  role: recruiter
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CONFLICT
                  message: Email already registered

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate a user
      description: Authenticates a user and returns a JWT Bearer token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: ana.souza@example.com
              password: StrongPass123
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: UNAUTHORIZED
                  message: Invalid credentials

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get the authenticated user's profile
      description: Returns the profile of the currently authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /jobs:
    get:
      tags:
        - Jobs
      summary: List public job postings
      description: |
        Returns non-deleted jobs. This endpoint is public and supports simple filtering
        and pagination.
      parameters:
        - $ref: '#/components/parameters/TitleFilter'
        - $ref: '#/components/parameters/LocationFilter'
        - $ref: '#/components/parameters/JobStatusFilter'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated list of jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListResponse'
    post:
      tags:
        - Jobs
      summary: Create a new job posting
      description: Recruiter-only endpoint to create a job posting.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
            example:
              title: Senior QA Engineer
              description: Lead quality strategy for a growing product team.
              location: Sao Paulo, BR
              salary: 8500
              status: open
      responses:
        '201':
          description: Job created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: User is not allowed to create jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                candidateForbidden:
                  value:
                    error:
                      code: FORBIDDEN
                      message: Only recruiters can access this resource

  /jobs/{id}:
    get:
      tags:
        - Jobs
      summary: Get a public job by ID
      description: Returns public details for a single non-deleted job.
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicJob'
        '404':
          $ref: '#/components/responses/JobNotFound'
    put:
      tags:
        - Jobs
      summary: Update a job posting
      description: Recruiter-only endpoint to update a job created by the authenticated recruiter.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJobRequest'
            example:
              title: Senior QA Engineer
              description: Lead quality strategy and automation efforts.
              location: Remote
              salary: 9500
              status: open
      responses:
        '204':
          description: Job updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: User is not allowed to update this job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                candidateForbidden:
                  value:
                    error:
                      code: FORBIDDEN
                      message: Only recruiters can access this resource
                ownershipForbidden:
                  value:
                    error:
                      code: FORBIDDEN
                      message: You can only update jobs created by you
        '404':
          $ref: '#/components/responses/JobNotFound'
    delete:
      tags:
        - Jobs
      summary: Delete a job posting
      description: Recruiter-only endpoint to hard delete a job created by the authenticated recruiter.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '204':
          description: Job deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: User is not allowed to delete this job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                candidateForbidden:
                  value:
                    error:
                      code: FORBIDDEN
                      message: Only recruiters can access this resource
                ownershipForbidden:
                  value:
                    error:
                      code: FORBIDDEN
                      message: You can only delete jobs created by you
        '404':
          $ref: '#/components/responses/JobNotFound'

  /jobs/{id}/apply:
    post:
      tags:
        - Applications
      summary: Apply to a job
      description: Candidate-only endpoint to submit a single application for a job.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
            example:
              resumeUrl: https://example.com/resumes/ana-souza.pdf
      responses:
        '201':
          description: Application created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApplicationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: User is not allowed to apply to jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: FORBIDDEN
                  message: Only candidates can access this resource
        '404':
          description: Job does not exist or has been deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: NOT_FOUND
                  message: Job not found
        '409':
          description: Application conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                closedJob:
                  value:
                    error:
                      code: CONFLICT
                      message: Cannot apply to a closed job
                duplicateApplication:
                  value:
                    error:
                      code: CONFLICT
                      message: You have already applied to this job

  /applications/me:
    get:
      tags:
        - Applications
      summary: Get authenticated candidate application history
      description: Candidate-only endpoint that lists applications created by the authenticated candidate.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated list of the candidate's applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationHistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: User is not allowed to view candidate application history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: FORBIDDEN
                  message: Only candidates can access this resource

  /jobs/{id}/applications:
    get:
      tags:
        - Applications
      summary: Get applicants for a recruiter's job
      description: Recruiter-only endpoint to review applications submitted to a job created by the authenticated recruiter.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of applications for the target job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobApplicationsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: User is not allowed to view these applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                candidateForbidden:
                  value:
                    error:
                      code: FORBIDDEN
                      message: Only recruiters can access this resource
                ownershipForbidden:
                  value:
                    error:
                      code: FORBIDDEN
                      message: You can only view applications for jobs created by you
        '404':
          $ref: '#/components/responses/JobNotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    JobId:
      name: id
      in: path
      required: true
      description: Unique job identifier
      schema:
        type: integer
        example: 1
    TitleFilter:
      name: title
      in: query
      required: false
      description: Filter jobs by title
      schema:
        type: string
    LocationFilter:
      name: location
      in: query
      required: false
      description: Filter jobs by location
      schema:
        type: string
    JobStatusFilter:
      name: status
      in: query
      required: false
      description: Filter jobs by status
      schema:
        $ref: '#/components/schemas/JobStatus'
    Page:
      name: page
      in: query
      required: false
      description: Page number for paginated results
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

  responses:
    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          example:
            error:
              code: BAD_REQUEST
              message: Validation failed
              details:
                - field: email
                  message: Email must be a valid email address
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: Missing or invalid token
    JobNotFound:
      description: Job not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: NOT_FOUND
              message: Job not found

  schemas:
    Role:
      type: string
      enum:
        - candidate
        - recruiter
      example: candidate

    JobStatus:
      type: string
      enum:
        - open
        - closed
      example: open

    ErrorObject:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: Validation failed
        details:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'

    ValidationErrorDetail:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          example: password
        message:
          type: string
          example: Password is required

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'

    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - email
        - password
        - role
      properties:
        name:
          type: string
          minLength: 1
          example: Ana Souza
        email:
          type: string
          format: email
          example: ana.souza@example.com
        password:
          type: string
          minLength: 1
          format: password
          example: StrongPass123
        role:
          $ref: '#/components/schemas/Role'

    User:
      type: object
      required:
        - id
        - name
        - email
        - role
        - createdAt
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ana Souza
        email:
          type: string
          format: email
          example: ana.souza@example.com
        role:
          $ref: '#/components/schemas/Role'
        createdAt:
          type: string
          format: date-time
          example: '2026-04-26T14:30:00Z'

    RegisterResponse:
      $ref: '#/components/schemas/User'

    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: ana.souza@example.com
        password:
          type: string
          minLength: 1
          format: password
          example: StrongPass123

    LoginResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: JWT Bearer token
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature

    ProfileResponse:
      $ref: '#/components/schemas/User'

    RecruiterSummary:
      type: object
      required:
        - createdBy
        - name
      properties:
        createdBy:
          type: integer
          example: 2
        name:
          type: string
          example: Carlos Lima

    PublicJob:
      type: object
      required:
        - id
        - title
        - description
        - location
        - status
        - recruiter
        - createdAt
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Senior QA Engineer
        description:
          type: string
          example: Lead quality strategy for a growing product team.
        location:
          type: string
          example: Sao Paulo, BR
        salary:
          type: number
          format: float
          minimum: 0
          nullable: true
          example: 8500
        status:
          $ref: '#/components/schemas/JobStatus'
        recruiter:
          $ref: '#/components/schemas/RecruiterSummary'
        createdAt:
          type: string
          format: date-time
          example: '2026-04-26T14:30:00Z'

    CreateJobRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - description
        - location
        - status
      properties:
        title:
          type: string
          minLength: 1
          example: Senior QA Engineer
        description:
          type: string
          minLength: 1
          example: Lead quality strategy for a growing product team.
        location:
          type: string
          minLength: 1
          example: Sao Paulo, BR
        salary:
          type: number
          format: float
          minimum: 0
          example: 8500
        status:
          $ref: '#/components/schemas/JobStatus'

    CreatedJob:
      type: object
      required:
        - id
        - title
        - description
        - location
        - status
        - createdBy
        - createdAt
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Senior QA Engineer
        description:
          type: string
          example: Lead quality strategy for a growing product team.
        location:
          type: string
          example: Sao Paulo, BR
        salary:
          type: number
          format: float
          minimum: 0
          nullable: true
          example: 8500
        status:
          $ref: '#/components/schemas/JobStatus'
        createdBy:
          type: integer
          example: 2
        createdAt:
          type: string
          format: date-time
          example: '2026-04-26T14:30:00Z'

    CreateJobResponse:
      $ref: '#/components/schemas/CreatedJob'

    UpdateJobRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - description
        - location
        - status
      properties:
        title:
          type: string
          minLength: 1
          example: Senior QA Engineer
        description:
          type: string
          minLength: 1
          example: Lead quality strategy and automation efforts.
        location:
          type: string
          minLength: 1
          example: Remote
        salary:
          type: number
          format: float
          minimum: 0
          example: 9500
        status:
          $ref: '#/components/schemas/JobStatus'

    PaginationMeta:
      type: object
      required:
        - page
        - limit
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        limit:
          type: integer
          minimum: 1
          example: 10
        total:
          type: integer
          minimum: 0
          example: 25
        totalPages:
          type: integer
          minimum: 0
          example: 3

    JobListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PublicJob'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    CreateApplicationRequest:
      type: object
      additionalProperties: false
      required:
        - resumeUrl
      properties:
        resumeUrl:
          type: string
          format: uri
          minLength: 1
          example: https://example.com/resumes/ana-souza.pdf

    Application:
      type: object
      required:
        - id
        - jobId
        - candidateId
        - resumeUrl
        - appliedAt
      properties:
        id:
          type: integer
          example: 1
        jobId:
          type: integer
          example: 1
        candidateId:
          type: integer
          example: 1
        resumeUrl:
          type: string
          format: uri
          example: https://example.com/resumes/ana-souza.pdf
        appliedAt:
          type: string
          format: date-time
          example: '2026-04-26T15:00:00Z'

    CreateApplicationResponse:
      $ref: '#/components/schemas/Application'

    JobReference:
      allOf:
        - $ref: '#/components/schemas/PublicJob'

    CandidateApplicationHistoryItem:
      type: object
      required:
        - id
        - appliedAt
        - job
      properties:
        id:
          type: integer
          example: 1
        appliedAt:
          type: string
          format: date-time
          example: '2026-04-26T15:00:00Z'
        job:
          $ref: '#/components/schemas/JobReference'

    ApplicationHistoryResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CandidateApplicationHistoryItem'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    CandidateSummary:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ana Souza
        email:
          type: string
          format: email
          example: ana.souza@example.com

    JobApplicantItem:
      type: object
      required:
        - id
        - candidate
        - resumeUrl
        - appliedAt
      properties:
        id:
          type: integer
          example: 1
        candidate:
          $ref: '#/components/schemas/CandidateSummary'
        resumeUrl:
          type: string
          format: uri
          example: https://example.com/resumes/ana-souza.pdf
        appliedAt:
          type: string
          format: date-time
          example: '2026-04-26T15:00:00Z'

    JobApplicationsResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/JobApplicantItem'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'